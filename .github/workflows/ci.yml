name: React Native CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # -- ANDROID BUILD --
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Generate Android Native Code (Expo Prebuild)
        # This generates the /android folder if you are using an Expo managed project.
        # If the project is already bare React Native, this will gracefully skip or update.
        run: npx expo prebuild --platform android --clean || true

      - name: Build Android APK (Release)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

  # -- IOS BUILD --
  ios-build:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Native Code (Expo Prebuild)
        # This generates the /ios folder for Expo projects.
        run: npx expo prebuild --platform ios --clean || true

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App (Simulator Debug)
        # Note: A release build (.ipa) for physical iOS devices requires Apple Certificates and Provisioning Profiles.
        # This workflow compiles a simulator build to verify iOS compilation steps pass.
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(echo $WORKSPACE | sed 's/.xcworkspace//')
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Debug -sdk iphonesimulator build -derivedDataPath build

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ios/build/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 7

  # -- WEB BUILD --
  web-build:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web
        # For Expo web or Vite web builds
        run: npm run build

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/ # Adjust to 'web-build' depending on your bundler (Vite=dist, Expo=web-build)
          retention-days: 7

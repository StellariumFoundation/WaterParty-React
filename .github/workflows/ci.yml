name: Mobile CI Build (Capacitor)

on:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -- WEB STATIC BUILD --
  web-build:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Zip Web Assets
        run: zip -r WaterParty.Web.zip dist/*
      - uses: actions/upload-artifact@v4
        with: { name: web-dist, path: dist/, retention-days: 7 }
      - uses: actions/upload-artifact@v4
        with: { name: web-zip, path: WaterParty.Web.zip, retention-days: 7 }

  # -- ANDROID CAPACITOR BUILD --
  android-build:
    name: Build Android APK
    needs: web-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - name: Setup Java
        uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '21' }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with: { name: web-dist, path: dist/ }
      - run: |
          npx cap add android || true
          npx cap sync android
      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../WaterParty.Android.apk
      - uses: actions/upload-artifact@v4
        with: { name: android-apk, path: WaterParty.Android.apk, retention-days: 7 }

  # -- IOS CAPACITOR BUILD --
  ios-build:
    name: Build iOS App
    needs: web-build
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with: { name: web-dist, path: dist/ }
      - run: |
          npx cap add ios || true
          npx cap sync ios
          npx cap update ios
      - name: Build iOS App (Simulator Debug)
        run: |
          cd ios/App
          xcodebuild -project "App.xcodeproj" -scheme "App" -configuration Debug -sdk iphonesimulator build -derivedDataPath build
          # Zip the app bundle to make it portable and easier to handle as a single file
          zip -r WaterParty.iOS.zip build/Build/Products/Debug-iphonesimulator/App.app
      - uses: actions/upload-artifact@v4
        with: { name: ios-simulator-app, path: WaterParty.iOS.zip, retention-days: 7 }

  release:
    name: Create GitHub Release
    needs: [android-build, ios-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with: { path: artifacts/ }
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "continuous-build-${{ github.sha }}"
          name: "Continuous Build ${{ github.sha }}"
          files: |
            artifacts/android-apk/WaterParty.Android.apk
            artifacts/ios-simulator-app/WaterParty.iOS.zip
            artifacts/web-zip/WaterParty.Web.zip
          body: |
            # 🌊 WaterParty - The Ultimate Party Experience
            
            Welcome to the latest experimental build of **WaterParty**! This release contains high-performance debug builds for our mobile platforms and a preview of the web experience.

            ---

            ## 📱 Mobile Architecture
            Built with [Capacitor](https://capacitorjs.com/) to bridge the gap between our high-performance web core and native mobile capabilities.

            ### 🤖 Android (APK)
            *   **Platform:** Android
            *   **Build:** Debug (Unsigned)
            *   **Installation:** Download the `app-debug.apk` file to your device. 
                *(Note: You may need to enable 'Install from unknown sources' in your Android security settings to install this APK).*

            ### 🍎 iOS (Simulator)
            *   **Platform:** iOS
            *   **Build:** Simulator-Debug
            *   **Usage:** Download the `.app` folder and unzip. Drag and drop the folder onto your **Xcode Simulator** window to install and test.

            ---

            ## 💻 Web Preview
            Our web application is live and optimized for modern browsers.
            🔗 [Access WaterParty Web](https://ais-dev-lr54twg5655e4thhbtygne-661033979019.us-east1.run.app)

            ---

            ## 🛠 Build Metadata
            *   **Commit SHA:** `${{ github.sha }}`
            *   **Build Timestamp:** ${{ github.event.head_commit.timestamp }}
            *   **CI Pipeline:** [View Build Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

